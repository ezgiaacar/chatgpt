<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="rtSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88B8D8"/>
      <stop offset="40%" stop-color="#A8CCE0"/>
      <stop offset="100%" stop-color="#C8DCE8"/>
    </linearGradient>
    <radialGradient id="rtSunGlow" cx="0.7" cy="0.12" r="0.35">
      <stop offset="0%" stop-color="#FFF8D0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF3C0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rtBuildingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0C8BC"/>
      <stop offset="100%" stop-color="#C4BCB0"/>
    </linearGradient>
    <linearGradient id="rtBuildingDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0988C"/>
      <stop offset="100%" stop-color="#908880"/>
    </linearGradient>
    <linearGradient id="rtRoofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0A898"/>
      <stop offset="100%" stop-color="#A09888"/>
    </linearGradient>
    <linearGradient id="rtSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6E4A"/>
      <stop offset="100%" stop-color="#7A5E3A"/>
    </linearGradient>
    <linearGradient id="rtWoodBed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8956E"/>
      <stop offset="100%" stop-color="#A68460"/>
    </linearGradient>
    <linearGradient id="rtMetalBed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#808880"/>
      <stop offset="100%" stop-color="#707870"/>
    </linearGradient>
    <linearGradient id="rtLeafGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A9040"/>
      <stop offset="100%" stop-color="#4A8030"/>
    </linearGradient>
    <linearGradient id="rtLeafDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A7020"/>
      <stop offset="100%" stop-color="#2A6015"/>
    </linearGradient>
    <linearGradient id="rtLeafLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6BA050"/>
      <stop offset="100%" stop-color="#5A9040"/>
    </linearGradient>
    <linearGradient id="rtPotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49070"/>
      <stop offset="100%" stop-color="#B08060"/>
    </linearGradient>
    <linearGradient id="rtConcreteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8C0B4"/>
      <stop offset="100%" stop-color="#B8B0A4"/>
    </linearGradient>
    <linearGradient id="rtSolarPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#304060"/>
      <stop offset="100%" stop-color="#203050"/>
    </linearGradient>
    <linearGradient id="rtWindowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88B8D8"/>
      <stop offset="40%" stop-color="#A0C8E0"/>
      <stop offset="100%" stop-color="#B0D0E4"/>
    </linearGradient>
    <linearGradient id="rtMetalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0A8A0"/>
      <stop offset="100%" stop-color="#909890"/>
    </linearGradient>
    <filter id="rtSoftShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="3" result="offset"/>
      <feFlood flood-color="#2A3040" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rtSubtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="2" result="offset"/>
      <feFlood flood-color="#2A3040" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rtHaze">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- ============ SKY ============ -->
  <rect width="800" height="600" fill="url(#rtSkyGrad)"/>
  <rect width="800" height="600" fill="url(#rtSunGlow)"/>

  <!-- ============ CLOUDS ============ -->
  <g opacity="0.5">
    <ellipse cx="200" cy="50" rx="75" ry="24" fill="#FFF" opacity="0.7"/>
    <ellipse cx="230" cy="44" rx="50" ry="18" fill="#FFF" opacity="0.8"/>
    <ellipse cx="170" cy="55" rx="40" ry="14" fill="#FFF" opacity="0.6"/>
  </g>
  <g opacity="0.4">
    <ellipse cx="580" cy="65" rx="60" ry="20" fill="#FFF" opacity="0.6"/>
    <ellipse cx="600" cy="60" rx="40" ry="15" fill="#FFF" opacity="0.7"/>
  </g>

  <!-- ============ CITY SKYLINE (distant) ============ -->
  <g opacity="0.2" filter="url(#rtHaze)">
    <!-- Far buildings -->
    <rect x="50" y="240" width="30" height="80" fill="#A09888"/>
    <rect x="85" y="220" width="25" height="100" fill="#908880"/>
    <rect x="115" y="250" width="35" height="70" fill="#A09888"/>
    <rect x="160" y="230" width="20" height="90" fill="#B0A898"/>
    <rect x="600" y="235" width="28" height="85" fill="#A09888"/>
    <rect x="635" y="245" width="35" height="75" fill="#908880"/>
    <rect x="680" y="225" width="22" height="95" fill="#A09888"/>
    <rect x="710" y="240" width="30" height="80" fill="#B0A898"/>
    <rect x="745" y="250" width="25" height="70" fill="#908880"/>
  </g>

  <!-- ============ NEIGHBORING BUILDINGS (mid-distance) ============ -->
  <!-- Left building -->
  <g filter="url(#rtSoftShadow)">
    <rect x="0" y="250" width="120" height="350" fill="url(#rtBuildingDark)"/>
    <!-- Windows -->
    <g opacity="0.4">
      <rect x="15" y="270" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="45" y="270" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="75" y="270" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="15" y="305" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="45" y="305" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="75" y="305" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="15" y="340" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="45" y="340" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="75" y="340" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
    </g>
  </g>
  <!-- Right building -->
  <g filter="url(#rtSoftShadow)">
    <rect x="700" y="270" width="100" height="330" fill="url(#rtBuildingDark)"/>
    <g opacity="0.4">
      <rect x="715" y="290" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="745" y="290" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="715" y="325" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="745" y="325" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="715" y="360" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
      <rect x="745" y="360" width="18" height="22" rx="1" fill="url(#rtWindowGrad)"/>
    </g>
  </g>

  <!-- ============ MAIN ROOFTOP SURFACE ============ -->
  <rect x="100" y="320" width="620" height="280" fill="url(#rtRoofGrad)"/>
  <!-- Rooftop edge/parapet -->
  <rect x="95" y="315" width="630" height="10" rx="2" fill="url(#rtConcreteGrad)"/>
  <!-- Roof texture -->
  <g opacity="0.06">
    <line x1="100" y1="340" x2="720" y2="340" stroke="#808080" stroke-width="0.5"/>
    <line x1="100" y1="380" x2="720" y2="380" stroke="#808080" stroke-width="0.5"/>
    <line x1="100" y1="420" x2="720" y2="420" stroke="#808080" stroke-width="0.5"/>
    <line x1="100" y1="460" x2="720" y2="460" stroke="#808080" stroke-width="0.5"/>
    <line x1="100" y1="500" x2="720" y2="500" stroke="#808080" stroke-width="0.5"/>
  </g>

  <!-- ============ RAISED PLANTING BEDS ============ -->
  <!-- Bed 1 (left, wood) -->
  <g filter="url(#rtSubtleShadow)" transform="translate(120, 355)">
    <rect x="0" y="0" width="170" height="55" rx="4" fill="url(#rtWoodBed)"/>
    <rect x="3" y="3" width="164" height="49" rx="3" fill="url(#rtSoil)"/>
    <g opacity="0.25">
      <line x1="10" y1="14" x2="160" y2="14" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="26" x2="160" y2="26" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="38" x2="160" y2="38" stroke="#5A4020" stroke-width="1"/>
    </g>
  </g>

  <!-- Bed 2 (center, galvanized metal) -->
  <g filter="url(#rtSubtleShadow)" transform="translate(320, 358)">
    <rect x="0" y="0" width="160" height="50" rx="3" fill="url(#rtMetalBed)"/>
    <rect x="3" y="3" width="154" height="44" rx="2" fill="url(#rtSoil)"/>
    <!-- Corrugation lines -->
    <g opacity="0.1">
      <line x1="0" y1="10" x2="0" y2="50" stroke="#606860" stroke-width="1"/>
      <line x1="12" y1="8" x2="12" y2="50" stroke="#606860" stroke-width="1"/>
      <line x1="24" y1="6" x2="24" y2="50" stroke="#606860" stroke-width="1"/>
      <line x1="136" y1="6" x2="136" y2="50" stroke="#606860" stroke-width="1"/>
      <line x1="148" y1="8" x2="148" y2="50" stroke="#606860" stroke-width="1"/>
      <line x1="160" y1="10" x2="160" y2="50" stroke="#606860" stroke-width="1"/>
    </g>
    <g opacity="0.2">
      <line x1="10" y1="14" x2="150" y2="14" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="25" x2="150" y2="25" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="36" x2="150" y2="36" stroke="#5A4020" stroke-width="1"/>
    </g>
  </g>

  <!-- Bed 3 (right, wood) -->
  <g filter="url(#rtSubtleShadow)" transform="translate(520, 355)">
    <rect x="0" y="0" width="160" height="55" rx="4" fill="url(#rtWoodBed)"/>
    <rect x="3" y="3" width="154" height="49" rx="3" fill="url(#rtSoil)"/>
    <g opacity="0.25">
      <line x1="10" y1="14" x2="150" y2="14" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="26" x2="150" y2="26" stroke="#5A4020" stroke-width="1"/>
      <line x1="10" y1="38" x2="150" y2="38" stroke="#5A4020" stroke-width="1"/>
    </g>
  </g>

  <!-- ============ SOLAR PANELS (top-right corner) ============ -->
  <g transform="translate(580, 330)" opacity="0.6">
    <rect x="0" y="0" width="60" height="35" rx="1" fill="url(#rtSolarPanel)" transform="skewY(-5)"/>
    <rect x="65" y="0" width="60" height="35" rx="1" fill="url(#rtSolarPanel)" transform="skewY(-5)"/>
    <!-- Grid lines -->
    <g opacity="0.2" stroke="#5070A0" stroke-width="0.5">
      <line x1="0" y1="9" x2="60" y2="9" transform="skewY(-5)"/>
      <line x1="0" y1="18" x2="60" y2="18" transform="skewY(-5)"/>
      <line x1="0" y1="27" x2="60" y2="27" transform="skewY(-5)"/>
      <line x1="20" y1="0" x2="20" y2="35" transform="skewY(-5)"/>
      <line x1="40" y1="0" x2="40" y2="35" transform="skewY(-5)"/>
      <line x1="65" y1="9" x2="125" y2="9" transform="skewY(-5)"/>
      <line x1="65" y1="18" x2="125" y2="18" transform="skewY(-5)"/>
      <line x1="65" y1="27" x2="125" y2="27" transform="skewY(-5)"/>
      <line x1="85" y1="0" x2="85" y2="35" transform="skewY(-5)"/>
      <line x1="105" y1="0" x2="105" y2="35" transform="skewY(-5)"/>
    </g>
    <!-- Shine -->
    <rect x="5" y="2" width="15" height="10" fill="#FFFFFF" opacity="0.1" transform="skewY(-5)"/>
    <rect x="70" y="2" width="15" height="10" fill="#FFFFFF" opacity="0.08" transform="skewY(-5)"/>
  </g>

  <!-- ============ UTILITY SHED / STORAGE ============ -->
  <g filter="url(#rtSoftShadow)" transform="translate(120, 425)">
    <!-- Shed body -->
    <rect x="0" y="0" width="60" height="50" rx="2" fill="url(#rtBuildingGrad)"/>
    <!-- Roof -->
    <rect x="-3" y="-4" width="66" height="6" rx="1" fill="#908880"/>
    <!-- Door -->
    <rect x="20" y="15" width="22" height="35" rx="1" fill="#7A7068"/>
    <circle cx="38" cy="35" r="1.5" fill="#A0A8A0"/>
    <!-- Vent -->
    <rect x="5" y="8" width="10" height="6" rx="1" fill="#8A8278" opacity="0.5"/>
  </g>

  <!-- ============ COMPOST BINS ============ -->
  <g transform="translate(195, 448)">
    <rect x="0" y="0" width="28" height="26" rx="2" fill="#6B5A40"/>
    <rect x="32" y="0" width="28" height="26" rx="2" fill="#6B5A40"/>
    <!-- Slats -->
    <g opacity="0.2">
      <line x1="5" y1="0" x2="5" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
      <line x1="14" y1="0" x2="14" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
      <line x1="23" y1="0" x2="23" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
      <line x1="37" y1="0" x2="37" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
      <line x1="46" y1="0" x2="46" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
      <line x1="55" y1="0" x2="55" y2="26" stroke="#5A4A30" stroke-width="0.5"/>
    </g>
    <!-- Compost visible -->
    <ellipse cx="14" cy="2" rx="10" ry="3" fill="#5A4A20" opacity="0.3"/>
    <ellipse cx="46" cy="2" rx="10" ry="3" fill="#5A4A20" opacity="0.3"/>
  </g>

  <!-- ============ WATERING SYSTEM (drip hose) ============ -->
  <g opacity="0.25">
    <path d="M130,390 Q200,385 280,390" fill="none" stroke="#2A2A2A" stroke-width="2"/>
    <path d="M330,392 Q380,388 460,393" fill="none" stroke="#2A2A2A" stroke-width="2"/>
    <path d="M530,388 Q580,385 660,390" fill="none" stroke="#2A2A2A" stroke-width="2"/>
    <!-- Drip points -->
    <circle cx="160" cy="390" r="1.5" fill="#7AAAB8" opacity="0.4"/>
    <circle cx="220" cy="388" r="1.5" fill="#7AAAB8" opacity="0.4"/>
    <circle cx="370" cy="391" r="1.5" fill="#7AAAB8" opacity="0.4"/>
    <circle cx="430" cy="390" r="1.5" fill="#7AAAB8" opacity="0.4"/>
    <circle cx="560" cy="388" r="1.5" fill="#7AAAB8" opacity="0.4"/>
    <circle cx="630" cy="389" r="1.5" fill="#7AAAB8" opacity="0.4"/>
  </g>

  <!-- ============ POTTED PLANTS (along parapet) ============ -->
  <!-- Large pot left -->
  <g filter="url(#rtSubtleShadow)" transform="translate(105, 290)">
    <path d="M-10,10 L-8,25 Q0,28 8,25 L10,10 Z" fill="url(#rtPotGrad)"/>
    <ellipse cx="0" cy="10" rx="10" ry="4" fill="#D4A080"/>
    <ellipse cx="0" cy="10" rx="7" ry="2.5" fill="#5A4830"/>
    <!-- Small tree -->
    <path d="M0,6 Q0,-5 -2,-15" fill="none" stroke="#5A4020" stroke-width="2"/>
    <ellipse cx="-2" cy="-18" rx="10" ry="8" fill="url(#rtLeafGreen)" opacity="0.7"/>
    <ellipse cx="3" cy="-22" rx="8" ry="6" fill="url(#rtLeafLight)" opacity="0.6"/>
  </g>

  <!-- Large pot right -->
  <g filter="url(#rtSubtleShadow)" transform="translate(700, 295)">
    <path d="M-10,10 L-8,25 Q0,28 8,25 L10,10 Z" fill="url(#rtPotGrad)"/>
    <ellipse cx="0" cy="10" rx="10" ry="4" fill="#D4A080"/>
    <ellipse cx="0" cy="10" rx="7" ry="2.5" fill="#5A4830"/>
    <path d="M0,6 Q2,-5 0,-15" fill="none" stroke="#5A4020" stroke-width="2"/>
    <ellipse cx="0" cy="-18" rx="10" ry="8" fill="url(#rtLeafGreen)" opacity="0.7"/>
    <ellipse cx="-3" cy="-22" rx="8" ry="6" fill="url(#rtLeafDark)" opacity="0.6"/>
  </g>

  <!-- Herb pots along parapet -->
  <g transform="translate(300, 305)">
    <rect x="0" y="0" width="12" height="10" rx="2" fill="url(#rtPotGrad)" opacity="0.6"/>
    <ellipse cx="6" cy="-3" rx="7" ry="5" fill="url(#rtLeafGreen)" opacity="0.5"/>
    <rect x="20" y="2" width="10" height="8" rx="2" fill="url(#rtPotGrad)" opacity="0.6"/>
    <ellipse cx="25" cy="-1" rx="6" ry="4.5" fill="url(#rtLeafLight)" opacity="0.45"/>
    <rect x="38" y="0" width="12" height="10" rx="2" fill="url(#rtPotGrad)" opacity="0.6"/>
    <ellipse cx="44" cy="-3" rx="7" ry="5" fill="url(#rtLeafDark)" opacity="0.5"/>
  </g>

  <!-- ============ TOOL RACK ============ -->
  <g transform="translate(680, 430)" opacity="0.5">
    <!-- Rack board -->
    <rect x="0" y="0" width="5" height="50" rx="1" fill="#8A8278"/>
    <!-- Tools hanging -->
    <rect x="-8" y="5" width="3" height="30" rx="1" fill="#7A5835" transform="rotate(5, -6, 5)"/>
    <rect x="8" y="8" width="3" height="28" rx="1" fill="#7A5835" transform="rotate(-5, 9, 8)"/>
    <!-- Shovel blade -->
    <ellipse cx="-6" cy="36" rx="4" ry="5" fill="#808880" opacity="0.5" transform="rotate(5, -6, 36)"/>
    <!-- Fork tines -->
    <g transform="translate(10, 37) rotate(-5)">
      <line x1="-2" y1="0" x2="-2" y2="6" stroke="#808880" stroke-width="1"/>
      <line x1="1" y1="0" x2="1" y2="6" stroke="#808880" stroke-width="1"/>
      <line x1="4" y1="0" x2="4" y2="6" stroke="#808880" stroke-width="1"/>
    </g>
  </g>

  <!-- ============ STRING LIGHTS (festoon) ============ -->
  <g opacity="0.35">
    <path d="M120,325 Q250,340 400,330 Q550,340 690,325" fill="none" stroke="#2A2A2A" stroke-width="1"/>
    <!-- Bulbs -->
    <circle cx="180" cy="334" r="3" fill="#FFE8B0"/>
    <circle cx="260" cy="336" r="3" fill="#FFE8B0"/>
    <circle cx="340" cy="333" r="3" fill="#FFE8B0"/>
    <circle cx="420" cy="332" r="3" fill="#FFE8B0"/>
    <circle cx="500" cy="335" r="3" fill="#FFE8B0"/>
    <circle cx="580" cy="337" r="3" fill="#FFE8B0"/>
    <circle cx="650" cy="330" r="3" fill="#FFE8B0"/>
  </g>

  <!-- ============ BIRDS ============ -->
  <g transform="translate(350, 180)" opacity="0.45">
    <path d="M0,0 Q-5,-4 -10,-2 Q-5,-1 0,0 Q5,-1 10,-2 Q5,-4 0,0" fill="#5A4A3A"/>
  </g>
  <g transform="translate(375, 175)" opacity="0.35">
    <path d="M0,0 Q-4,-3 -8,-2 Q-4,-1 0,0 Q4,-1 8,-2 Q4,-3 0,0" fill="#5A4A3A"/>
  </g>

  <!-- ============ BEE BOX (beehive) ============ -->
  <g transform="translate(495, 435)" opacity="0.5">
    <rect x="0" y="0" width="22" height="8" rx="1" fill="#E8DCC0"/>
    <rect x="0" y="10" width="22" height="8" rx="1" fill="#E0D4B8"/>
    <rect x="0" y="20" width="22" height="8" rx="1" fill="#E8DCC0"/>
    <!-- Roof -->
    <rect x="-2" y="-4" width="26" height="5" rx="1" fill="#A08060"/>
    <!-- Entrance -->
    <rect x="8" y="26" width="6" height="2" fill="#5A4A30"/>
    <!-- Tiny bee -->
    <ellipse cx="28" cy="18" rx="2" ry="1.5" fill="#E8C040" opacity="0.5"/>
    <ellipse cx="30" cy="17" rx="2" ry="1" fill="#FFF" opacity="0.2"/>
  </g>

  <!-- ============ WARM AMBIENT OVERLAY ============ -->
  <rect width="800" height="600" fill="#FFF8D0" opacity="0.04"/>
</svg>
