<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="jpSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8D8E8"/>
      <stop offset="50%" stop-color="#D8E4EC"/>
      <stop offset="100%" stop-color="#E8EEE8"/>
    </linearGradient>
    <radialGradient id="jpSunGlow" cx="0.3" cy="0.12" r="0.35">
      <stop offset="0%" stop-color="#FFF8E0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFF3D6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jpGrassFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A9E6B"/>
      <stop offset="100%" stop-color="#6B8F5A"/>
    </linearGradient>
    <linearGradient id="jpGrassMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8050"/>
      <stop offset="100%" stop-color="#4A7040"/>
    </linearGradient>
    <linearGradient id="jpGrassNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7040"/>
      <stop offset="100%" stop-color="#3A6030"/>
    </linearGradient>
    <linearGradient id="jpMossGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8F50"/>
      <stop offset="100%" stop-color="#5A7E42"/>
    </linearGradient>
    <linearGradient id="jpStoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0988A"/>
      <stop offset="100%" stop-color="#8A8278"/>
    </linearGradient>
    <linearGradient id="jpStoneDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#787068"/>
      <stop offset="100%" stop-color="#686058"/>
    </linearGradient>
    <linearGradient id="jpWaterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8AAAB8"/>
      <stop offset="50%" stop-color="#7A9AA8"/>
      <stop offset="100%" stop-color="#6A8A98"/>
    </linearGradient>
    <linearGradient id="jpBridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A04040"/>
      <stop offset="100%" stop-color="#883030"/>
    </linearGradient>
    <linearGradient id="jpPagodaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7060"/>
      <stop offset="100%" stop-color="#7A6050"/>
    </linearGradient>
    <linearGradient id="jpPagodaRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A4A3A"/>
      <stop offset="100%" stop-color="#4A3A2A"/>
    </linearGradient>
    <linearGradient id="jpMapleLeaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C85050"/>
      <stop offset="100%" stop-color="#A84040"/>
    </linearGradient>
    <linearGradient id="jpMapleLeaf2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D86848"/>
      <stop offset="100%" stop-color="#C05838"/>
    </linearGradient>
    <linearGradient id="jpCherryBlossom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0B8C0"/>
      <stop offset="100%" stop-color="#E8A0A8"/>
    </linearGradient>
    <linearGradient id="jpTreeTrunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4A30"/>
      <stop offset="100%" stop-color="#5A3A22"/>
    </linearGradient>
    <linearGradient id="jpBambooGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8F50"/>
      <stop offset="100%" stop-color="#5A7E42"/>
    </linearGradient>
    <linearGradient id="jpLanternGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A09888"/>
      <stop offset="100%" stop-color="#888078"/>
    </linearGradient>
    <linearGradient id="jpGravelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4CCB8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#E0D8C4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D4CCB8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="jpSoftShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="2" dy="3" result="offset"/>
      <feFlood flood-color="#2A3A20" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="jpHaze">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="jpWaterReflect" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- ============ SKY ============ -->
  <rect width="800" height="600" fill="url(#jpSkyGrad)"/>
  <rect width="800" height="600" fill="url(#jpSunGlow)"/>

  <!-- ============ CLOUDS ============ -->
  <g opacity="0.4">
    <ellipse cx="200" cy="60" rx="70" ry="20" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="230" cy="55" rx="45" ry="16" fill="#FFFFFF" opacity="0.6"/>
    <ellipse cx="170" cy="65" rx="35" ry="12" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <g opacity="0.3">
    <ellipse cx="600" cy="80" rx="60" ry="18" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="620" cy="75" rx="40" ry="14" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- ============ DISTANT MOUNTAINS ============ -->
  <path d="M0,280 Q80,230 180,260 Q280,220 400,250 Q520,215 620,245 Q720,225 800,260 L800,340 L0,340 Z"
        fill="#9AB88A" opacity="0.35" filter="url(#jpHaze)"/>
  <path d="M0,310 Q120,280 250,295 Q400,270 550,290 Q680,275 800,300 L800,360 L0,360 Z"
        fill="#8BAD7A" opacity="0.45" filter="url(#jpHaze)"/>

  <!-- ============ FAR GRASS ============ -->
  <path d="M0,335 Q200,320 400,328 Q600,315 800,330 L800,400 L0,400 Z" fill="url(#jpGrassFar)"/>

  <!-- ============ PAGODA LANTERN (far, right side) ============ -->
  <g filter="url(#jpSoftShadow)" transform="translate(640, 300)" opacity="0.7">
    <!-- Base -->
    <rect x="-10" y="25" width="20" height="8" rx="2" fill="url(#jpLanternGrad)"/>
    <!-- Post -->
    <rect x="-4" y="0" width="8" height="25" rx="1" fill="url(#jpLanternGrad)"/>
    <!-- Lantern box -->
    <rect x="-8" y="-15" width="16" height="15" rx="1" fill="#A09888"/>
    <rect x="-6" y="-13" width="12" height="11" rx="1" fill="#E8E0D0" opacity="0.4"/>
    <!-- Roof -->
    <path d="M-12,-15 L0,-22 L12,-15 Z" fill="url(#jpStoneDark)"/>
    <!-- Finial -->
    <circle cx="0" cy="-24" r="2" fill="url(#jpLanternGrad)"/>
  </g>

  <!-- ============ CHERRY BLOSSOM TREE (left) ============ -->
  <g filter="url(#jpSoftShadow)" transform="translate(80, 180)">
    <!-- Ground shadow -->
    <ellipse cx="20" cy="275" rx="60" ry="10" fill="#2A3A20" opacity="0.08"/>
    <!-- Trunk — gnarled, organic -->
    <path d="M15,95 Q10,140 12,180 Q14,220 18,275" fill="none" stroke="url(#jpTreeTrunk)" stroke-width="14" stroke-linecap="round"/>
    <path d="M18,100 Q22,140 20,180 Q18,220 22,275" fill="none" stroke="#5A3A22" stroke-width="10" stroke-linecap="round"/>
    <!-- Main branches -->
    <path d="M15,120 Q-5,100 -25,85" fill="none" stroke="#6B4A30" stroke-width="5" stroke-linecap="round"/>
    <path d="M20,105 Q40,80 65,70" fill="none" stroke="#6B4A30" stroke-width="4" stroke-linecap="round"/>
    <path d="M12,140 Q-10,125 -30,120" fill="none" stroke="#6B4A30" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M22,90 Q15,65 5,50" fill="none" stroke="#6B4A30" stroke-width="4" stroke-linecap="round"/>
    <!-- Cherry blossom canopy -->
    <ellipse cx="-20" cy="80" rx="35" ry="25" fill="url(#jpCherryBlossom)" opacity="0.7"/>
    <ellipse cx="15" cy="60" rx="40" ry="30" fill="url(#jpCherryBlossom)" opacity="0.6"/>
    <ellipse cx="55" cy="65" rx="30" ry="22" fill="#F0C0C8" opacity="0.55"/>
    <ellipse cx="0" cy="45" rx="30" ry="20" fill="#F5C8D0" opacity="0.5"/>
    <ellipse cx="-30" cy="115" rx="20" ry="15" fill="url(#jpCherryBlossom)" opacity="0.5"/>
    <ellipse cx="40" cy="50" rx="20" ry="15" fill="#F0B8C0" opacity="0.4"/>
    <!-- Blossom highlights -->
    <ellipse cx="-20" cy="75" rx="18" ry="10" fill="#F8D0D8" opacity="0.35"/>
    <ellipse cx="15" cy="55" rx="20" ry="12" fill="#F8D0D8" opacity="0.3"/>
    <!-- Falling petals -->
    <ellipse cx="50" cy="180" rx="3" ry="2" fill="#F0B8C0" opacity="0.5" transform="rotate(30, 50, 180)"/>
    <ellipse cx="35" cy="220" rx="2.5" ry="1.5" fill="#F5C8D0" opacity="0.4" transform="rotate(-20, 35, 220)"/>
    <ellipse cx="65" cy="250" rx="2" ry="1.5" fill="#F0B8C0" opacity="0.35" transform="rotate(45, 65, 250)"/>
    <ellipse cx="-10" cy="200" rx="2.5" ry="1.5" fill="#F5C8D0" opacity="0.4" transform="rotate(15, -10, 200)"/>
    <ellipse cx="80" cy="160" rx="2" ry="1.5" fill="#F0B8C0" opacity="0.3" transform="rotate(-30, 80, 160)"/>
  </g>

  <!-- ============ KOI POND ============ -->
  <g transform="translate(300, 380)">
    <!-- Pond shape -->
    <ellipse cx="100" cy="50" rx="130" ry="55" fill="url(#jpWaterGrad)" opacity="0.7"/>
    <!-- Pond edge stones -->
    <g opacity="0.5">
      <ellipse cx="10" cy="25" rx="12" ry="8" fill="url(#jpStoneGrad)" transform="rotate(-10, 10, 25)"/>
      <ellipse cx="35" cy="10" rx="10" ry="7" fill="url(#jpStoneDark)" transform="rotate(5, 35, 10)"/>
      <ellipse cx="60" cy="3" rx="11" ry="7" fill="url(#jpStoneGrad)" transform="rotate(-5, 60, 3)"/>
      <ellipse cx="100" cy="-2" rx="12" ry="6" fill="url(#jpStoneDark)" transform="rotate(8, 100, -2)"/>
      <ellipse cx="140" cy="2" rx="10" ry="7" fill="url(#jpStoneGrad)" transform="rotate(-8, 140, 2)"/>
      <ellipse cx="170" cy="12" rx="11" ry="7" fill="url(#jpStoneDark)" transform="rotate(12, 170, 12)"/>
      <ellipse cx="195" cy="30" rx="10" ry="8" fill="url(#jpStoneGrad)" transform="rotate(-5, 195, 30)"/>
      <ellipse cx="205" cy="55" rx="12" ry="7" fill="url(#jpStoneDark)" transform="rotate(5, 205, 55)"/>
      <ellipse cx="195" cy="78" rx="10" ry="7" fill="url(#jpStoneGrad)" transform="rotate(-10, 195, 78)"/>
      <ellipse cx="170" cy="92" rx="11" ry="6" fill="url(#jpStoneDark)" transform="rotate(8, 170, 92)"/>
      <ellipse cx="135" cy="100" rx="12" ry="7" fill="url(#jpStoneGrad)" transform="rotate(-5, 135, 100)"/>
      <ellipse cx="70" cy="98" rx="11" ry="7" fill="url(#jpStoneDark)" transform="rotate(5, 70, 98)"/>
      <ellipse cx="30" cy="85" rx="10" ry="7" fill="url(#jpStoneGrad)" transform="rotate(-8, 30, 85)"/>
      <ellipse cx="5" cy="60" rx="11" ry="8" fill="url(#jpStoneDark)" transform="rotate(10, 5, 60)"/>
    </g>
    <!-- Water surface reflections -->
    <g opacity="0.15" filter="url(#jpWaterReflect)">
      <ellipse cx="70" cy="40" rx="30" ry="4" fill="#FFFFFF"/>
      <ellipse cx="130" cy="55" rx="25" ry="3" fill="#FFFFFF"/>
      <ellipse cx="90" cy="65" rx="20" ry="3" fill="#FFFFFF"/>
    </g>
    <!-- Water ripples -->
    <g opacity="0.12">
      <ellipse cx="80" cy="45" rx="18" ry="6" fill="none" stroke="#A0C8D8" stroke-width="0.8"/>
      <ellipse cx="130" cy="50" rx="15" ry="5" fill="none" stroke="#A0C8D8" stroke-width="0.6"/>
    </g>
    <!-- Koi fish -->
    <g transform="translate(75, 40)">
      <path d="M0,0 Q8,-3 14,0 Q8,3 0,0Z" fill="#E87040" opacity="0.5"/>
      <path d="M14,0 Q18,-3 20,0 Q18,3 14,0Z" fill="#E87040" opacity="0.4"/>
      <circle cx="3" cy="-0.5" r="0.8" fill="#2A2A2A" opacity="0.3"/>
    </g>
    <g transform="translate(120, 55)">
      <path d="M0,0 Q-7,-2 -12,0 Q-7,2 0,0Z" fill="#F0F0F0" opacity="0.45"/>
      <path d="M-12,0 Q-16,-2 -18,0 Q-16,2 -12,0Z" fill="#F0F0F0" opacity="0.35"/>
      <circle cx="-3" cy="-0.5" r="0.8" fill="#2A2A2A" opacity="0.3"/>
    </g>
    <!-- Lily pads -->
    <g opacity="0.6">
      <ellipse cx="55" cy="55" rx="10" ry="5" fill="#5A8050" transform="rotate(-10, 55, 55)"/>
      <path d="M55,55 L55,50" stroke="#5A8050" stroke-width="0.5"/>
      <ellipse cx="150" cy="42" rx="8" ry="4" fill="#4A7040" transform="rotate(15, 150, 42)"/>
      <ellipse cx="95" cy="70" rx="9" ry="4.5" fill="#5A8050" transform="rotate(-5, 95, 70)"/>
    </g>
    <!-- Lotus flower on lily pad -->
    <g transform="translate(55, 48)">
      <ellipse cx="0" cy="0" rx="4" ry="6" fill="#F0B8C0" opacity="0.6" transform="rotate(-15, 0, 0)"/>
      <ellipse cx="0" cy="0" rx="4" ry="6" fill="#E8A8B0" opacity="0.5" transform="rotate(15, 0, 0)"/>
      <ellipse cx="0" cy="0" rx="3" ry="5" fill="#F5C8D0" opacity="0.5"/>
      <circle cx="0" cy="1" r="2" fill="#F0D888" opacity="0.4"/>
    </g>
  </g>

  <!-- ============ ARCHED BRIDGE ============ -->
  <g filter="url(#jpSoftShadow)" transform="translate(350, 375)">
    <!-- Bridge arch -->
    <path d="M0,35 Q50,0 100,35" fill="none" stroke="url(#jpBridgeGrad)" stroke-width="6"/>
    <!-- Bridge deck -->
    <path d="M0,35 Q50,2 100,35" fill="url(#jpBridgeGrad)" opacity="0.2"/>
    <!-- Railings -->
    <path d="M5,30 Q50,-5 95,30" fill="none" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
    <!-- Railing posts -->
    <line x1="15" y1="20" x2="15" y2="28" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
    <line x1="35" y1="10" x2="35" y2="18" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
    <line x1="50" y1="7" x2="50" y2="15" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
    <line x1="65" y1="10" x2="65" y2="18" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
    <line x1="85" y1="20" x2="85" y2="28" stroke="url(#jpBridgeGrad)" stroke-width="2"/>
  </g>

  <!-- ============ MID GRASS ============ -->
  <path d="M0,400 Q200,388 400,394 Q600,385 800,398 L800,465 L0,465 Z" fill="url(#jpGrassMid)"/>

  <!-- ============ STEPPING STONES PATH ============ -->
  <g opacity="0.5">
    <ellipse cx="500" cy="470" rx="16" ry="8" fill="url(#jpStoneGrad)" transform="rotate(-5, 500, 470)"/>
    <ellipse cx="520" cy="495" rx="14" ry="7" fill="url(#jpStoneDark)" transform="rotate(10, 520, 495)"/>
    <ellipse cx="510" cy="520" rx="15" ry="8" fill="url(#jpStoneGrad)" transform="rotate(-8, 510, 520)"/>
    <ellipse cx="525" cy="548" rx="14" ry="7" fill="url(#jpStoneDark)" transform="rotate(5, 525, 548)"/>
    <ellipse cx="515" cy="575" rx="16" ry="8" fill="url(#jpStoneGrad)" transform="rotate(-3, 515, 575)"/>
  </g>

  <!-- ============ NEAR GRASS ============ -->
  <path d="M0,455 Q100,445 200,452 Q300,442 400,448 Q500,440 600,447 Q700,440 800,450 L800,600 L0,600 Z"
        fill="url(#jpGrassNear)"/>

  <!-- ============ MAPLE TREE (right, partial) ============ -->
  <g transform="translate(680, 190)">
    <!-- Trunk -->
    <path d="M20,90 Q18,140 22,200 Q24,260 20,320" fill="none" stroke="url(#jpTreeTrunk)" stroke-width="12" stroke-linecap="round"/>
    <!-- Branches -->
    <path d="M20,110 Q0,90 -15,80" fill="none" stroke="#6B4A30" stroke-width="4" stroke-linecap="round"/>
    <path d="M22,95 Q40,75 55,65" fill="none" stroke="#6B4A30" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Maple canopy (red/orange) -->
    <ellipse cx="20" cy="65" rx="50" ry="40" fill="url(#jpMapleLeaf)" opacity="0.6"/>
    <ellipse cx="-10" cy="75" rx="35" ry="28" fill="url(#jpMapleLeaf2)" opacity="0.55"/>
    <ellipse cx="50" cy="60" rx="30" ry="25" fill="#D06040" opacity="0.5"/>
    <ellipse cx="20" cy="45" rx="28" ry="22" fill="#E07050" opacity="0.4"/>
    <ellipse cx="-5" cy="55" rx="20" ry="15" fill="#C85050" opacity="0.35"/>
    <!-- Highlights -->
    <ellipse cx="20" cy="58" rx="22" ry="12" fill="#E88060" opacity="0.25"/>
  </g>

  <!-- ============ BAMBOO GROVE (far right) ============ -->
  <g transform="translate(730, 260)" opacity="0.6">
    <line x1="0" y1="0" x2="0" y2="200" stroke="url(#jpBambooGrad)" stroke-width="5"/>
    <line x1="15" y1="10" x2="15" y2="200" stroke="#5A7E42" stroke-width="4"/>
    <line x1="30" y1="5" x2="30" y2="200" stroke="url(#jpBambooGrad)" stroke-width="4.5"/>
    <line x1="45" y1="15" x2="45" y2="200" stroke="#5A7E42" stroke-width="3.5"/>
    <!-- Nodes -->
    <g opacity="0.4">
      <line x1="-2" y1="50" x2="2" y2="50" stroke="#4A6A30" stroke-width="1"/>
      <line x1="-2" y1="100" x2="2" y2="100" stroke="#4A6A30" stroke-width="1"/>
      <line x1="13" y1="60" x2="17" y2="60" stroke="#4A6A30" stroke-width="1"/>
      <line x1="13" y1="110" x2="17" y2="110" stroke="#4A6A30" stroke-width="1"/>
      <line x1="28" y1="45" x2="32" y2="45" stroke="#4A6A30" stroke-width="1"/>
      <line x1="28" y1="95" x2="32" y2="95" stroke="#4A6A30" stroke-width="1"/>
    </g>
    <!-- Bamboo leaves -->
    <g opacity="0.5">
      <path d="M0,40 Q-12,35 -18,30" fill="none" stroke="#6B8F50" stroke-width="1"/>
      <ellipse cx="-18" cy="28" rx="8" ry="3" fill="#6B8F50" transform="rotate(-15, -18, 28)"/>
      <path d="M15,50 Q28,45 34,40" fill="none" stroke="#5A7E42" stroke-width="1"/>
      <ellipse cx="34" cy="38" rx="7" ry="2.5" fill="#5A7E42" transform="rotate(10, 34, 38)"/>
      <path d="M30,35 Q18,28 12,22" fill="none" stroke="#6B8F50" stroke-width="1"/>
      <ellipse cx="12" cy="20" rx="7" ry="2.5" fill="#6B8F50" transform="rotate(-20, 12, 20)"/>
    </g>
  </g>

  <!-- ============ STONE LANTERN (near path) ============ -->
  <g filter="url(#jpSoftShadow)" transform="translate(480, 430)">
    <!-- Base -->
    <rect x="-10" y="24" width="20" height="6" rx="1" fill="url(#jpStoneGrad)"/>
    <!-- Post -->
    <rect x="-5" y="6" width="10" height="18" rx="1" fill="url(#jpLanternGrad)"/>
    <!-- Light chamber -->
    <rect x="-8" y="-6" width="16" height="12" rx="1" fill="url(#jpStoneGrad)"/>
    <rect x="-6" y="-4" width="12" height="8" fill="#E8E0D0" opacity="0.3"/>
    <!-- Roof -->
    <path d="M-14,-6 L0,-14 L14,-6 Z" fill="url(#jpStoneDark)"/>
    <!-- Top finial -->
    <ellipse cx="0" cy="-15" rx="3" ry="2" fill="url(#jpLanternGrad)"/>
  </g>

  <!-- ============ DRY GRAVEL AREA (zen garden element) ============ -->
  <g transform="translate(200, 470)">
    <ellipse cx="60" cy="30" rx="70" ry="30" fill="url(#jpGravelGrad)" opacity="0.3"/>
    <!-- Raked lines -->
    <g opacity="0.1">
      <ellipse cx="60" cy="30" rx="55" ry="22" fill="none" stroke="#A09880" stroke-width="0.8"/>
      <ellipse cx="60" cy="30" rx="45" ry="17" fill="none" stroke="#A09880" stroke-width="0.6"/>
      <ellipse cx="60" cy="30" rx="35" ry="12" fill="none" stroke="#A09880" stroke-width="0.5"/>
    </g>
    <!-- Feature stone in gravel -->
    <ellipse cx="55" cy="28" rx="8" ry="6" fill="url(#jpStoneDark)" opacity="0.5"/>
  </g>

  <!-- ============ MOSS-COVERED ROCKS (foreground left) ============ -->
  <g transform="translate(30, 475)">
    <ellipse cx="20" cy="15" rx="22" ry="14" fill="url(#jpStoneDark)" opacity="0.5"/>
    <ellipse cx="45" cy="18" rx="16" ry="12" fill="url(#jpStoneGrad)" opacity="0.45"/>
    <ellipse cx="10" cy="20" rx="14" ry="10" fill="url(#jpStoneDark)" opacity="0.4"/>
    <!-- Moss patches -->
    <ellipse cx="18" cy="8" rx="10" ry="5" fill="url(#jpMossGrad)" opacity="0.4"/>
    <ellipse cx="40" cy="12" rx="8" ry="4" fill="#6B8F50" opacity="0.35"/>
  </g>

  <!-- ============ FOREGROUND GRASS BLADES ============ -->
  <g opacity="0.4">
    <path d="M15,600 Q12,575 18,560" fill="none" stroke="#3A6030" stroke-width="2"/>
    <path d="M45,600 Q42,572 48,558" fill="none" stroke="#4A7040" stroke-width="1.5"/>
    <path d="M760,600 Q758,570 764,555" fill="none" stroke="#3A6030" stroke-width="2"/>
    <path d="M780,600 Q782,578 776,565" fill="none" stroke="#4A7040" stroke-width="1.5"/>
    <path d="M400,600 Q398,582 402,570" fill="none" stroke="#4A7040" stroke-width="1.5"/>
  </g>

  <!-- ============ WARM AMBIENT OVERLAY ============ -->
  <rect width="800" height="600" fill="#FFF8E0" opacity="0.05"/>
</svg>
