<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="ngSkyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="40%" stop-color="#142040"/>
      <stop offset="100%" stop-color="#1E2A4A"/>
    </linearGradient>
    <radialGradient id="ngMoonGlow" cx="0.8" cy="0.12" r="0.25">
      <stop offset="0%" stop-color="#E8E4D8" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#C8C4B8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A0A0A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ngGroundFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A4030"/>
      <stop offset="100%" stop-color="#1E3425"/>
    </linearGradient>
    <linearGradient id="ngGroundMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3425"/>
      <stop offset="100%" stop-color="#15281C"/>
    </linearGradient>
    <linearGradient id="ngGroundNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15281C"/>
      <stop offset="100%" stop-color="#102015"/>
    </linearGradient>
    <linearGradient id="ngSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A3828"/>
      <stop offset="100%" stop-color="#3A2A1C"/>
    </linearGradient>
    <linearGradient id="ngWoodBed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A4430"/>
      <stop offset="100%" stop-color="#4A3825"/>
    </linearGradient>
    <linearGradient id="ngLeafGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A5020"/>
      <stop offset="100%" stop-color="#1E4018"/>
    </linearGradient>
    <linearGradient id="ngLeafDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A15"/>
      <stop offset="100%" stop-color="#152E10"/>
    </linearGradient>
    <linearGradient id="ngLeafMoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A6830"/>
      <stop offset="100%" stop-color="#2A5020"/>
    </linearGradient>
    <linearGradient id="ngTreeTrunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2A2018"/>
      <stop offset="100%" stop-color="#1E1810"/>
    </linearGradient>
    <linearGradient id="ngFenceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3028"/>
      <stop offset="100%" stop-color="#2A2420"/>
    </linearGradient>
    <linearGradient id="ngPathGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4038"/>
      <stop offset="100%" stop-color="#3A3430"/>
    </linearGradient>
    <linearGradient id="ngLanternGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0A0"/>
      <stop offset="100%" stop-color="#FFD080"/>
    </linearGradient>
    <linearGradient id="ngShedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3028"/>
      <stop offset="100%" stop-color="#2E2820"/>
    </linearGradient>
    <linearGradient id="ngShedRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2420"/>
      <stop offset="100%" stop-color="#201C18"/>
    </linearGradient>
    <radialGradient id="ngLanternRadial" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE0A0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFD080" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngFireflyGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#C8E860" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C8E860" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ngWindowGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD080" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD080" stop-opacity="0"/>
    </radialGradient>
    <filter id="ngSoftShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="1" dy="2" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.2" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ngSubtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="1" dy="1" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ngHaze">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="ngGlowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="ngSmallGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ============ NIGHT SKY ============ -->
  <rect width="800" height="600" fill="url(#ngSkyGrad)"/>

  <!-- ============ STARS ============ -->
  <g opacity="0.6">
    <circle cx="50" cy="30" r="1" fill="#FFFFFF"/>
    <circle cx="130" cy="60" r="0.8" fill="#FFFFFF"/>
    <circle cx="200" cy="20" r="1.2" fill="#FFFFFF"/>
    <circle cx="280" cy="50" r="0.8" fill="#FFFFFF"/>
    <circle cx="340" cy="15" r="1" fill="#FFFFFF"/>
    <circle cx="420" cy="45" r="0.7" fill="#FFFFFF"/>
    <circle cx="480" cy="25" r="1" fill="#FFFFFF"/>
    <circle cx="520" cy="70" r="0.8" fill="#FFFFFF"/>
    <circle cx="350" cy="80" r="0.7" fill="#FFFFFF"/>
    <circle cx="100" cy="100" r="0.8" fill="#FFFFFF"/>
    <circle cx="250" cy="110" r="0.7" fill="#FFFFFF"/>
    <circle cx="450" cy="95" r="1" fill="#FFFFFF"/>
    <circle cx="550" cy="40" r="0.8" fill="#FFFFFF"/>
    <circle cx="700" cy="50" r="0.7" fill="#FFFFFF"/>
    <circle cx="750" cy="100" r="1" fill="#FFFFFF"/>
    <circle cx="180" cy="140" r="0.6" fill="#FFFFFF"/>
    <circle cx="380" cy="130" r="0.8" fill="#FFFFFF"/>
    <circle cx="600" cy="110" r="0.7" fill="#FFFFFF"/>
    <circle cx="680" cy="130" r="0.6" fill="#FFFFFF"/>
    <circle cx="70" cy="150" r="0.7" fill="#FFFFFF"/>
  </g>

  <!-- ============ MOON ============ -->
  <g transform="translate(640, 60)">
    <!-- Moon glow -->
    <circle cx="0" cy="0" r="60" fill="url(#ngMoonGlow)" filter="url(#ngGlowBlur)" opacity="0.6"/>
    <!-- Moon body -->
    <circle cx="0" cy="0" r="22" fill="#E8E4D8" opacity="0.9"/>
    <!-- Moon craters -->
    <circle cx="-5" cy="-5" r="3" fill="#D8D4C8" opacity="0.4"/>
    <circle cx="6" cy="3" r="4" fill="#D0CCC0" opacity="0.3"/>
    <circle cx="-2" cy="8" r="2" fill="#D8D4C8" opacity="0.35"/>
    <circle cx="8" cy="-8" r="2" fill="#D0CCC0" opacity="0.3"/>
  </g>
  <!-- Moon light wash on scene -->
  <rect width="800" height="600" fill="url(#ngMoonGlow)" opacity="0.3"/>

  <!-- ============ DISTANT HILLS (dark silhouettes) ============ -->
  <path d="M0,260 Q120,235 250,250 Q400,225 550,245 Q700,230 800,255 L800,310 L0,310 Z"
        fill="#152818" opacity="0.6" filter="url(#ngHaze)"/>
  <path d="M0,285 Q180,268 350,278 Q520,262 680,275 Q750,270 800,282 L800,330 L0,330 Z"
        fill="#1A3020" opacity="0.65" filter="url(#ngHaze)"/>

  <!-- ============ FAR GROUND ============ -->
  <path d="M0,300 Q200,285 400,292 Q600,282 800,295 L800,370 L0,370 Z" fill="url(#ngGroundFar)"/>

  <!-- ============ GARDEN SHED (with warm window) ============ -->
  <g filter="url(#ngSoftShadow)" transform="translate(560, 230)">
    <ellipse cx="40" cy="85" rx="55" ry="8" fill="#000000" opacity="0.1"/>
    <!-- Shed body -->
    <rect x="5" y="25" width="70" height="60" fill="url(#ngShedGrad)"/>
    <!-- Roof -->
    <path d="M0,28 L40,-5 L80,28 Z" fill="url(#ngShedRoof)"/>
    <!-- Door -->
    <rect x="30" y="45" width="20" height="40" rx="2" fill="#1E1810"/>
    <circle cx="46" cy="68" r="1.5" fill="#5A4830" opacity="0.5"/>
    <!-- Window with warm glow -->
    <rect x="12" y="40" width="14" height="16" rx="1" fill="url(#ngLanternGlow)" opacity="0.6"/>
    <line x1="19" y1="40" x2="19" y2="56" stroke="#3A2A18" stroke-width="1.5"/>
    <line x1="12" y1="48" x2="26" y2="48" stroke="#3A2A18" stroke-width="1.5"/>
    <!-- Window glow radius -->
    <ellipse cx="19" cy="48" rx="25" ry="20" fill="url(#ngWindowGlow)" filter="url(#ngGlowBlur)" opacity="0.4"/>
    <!-- Planter at door -->
    <rect x="55" y="65" width="12" height="10" rx="2" fill="#3A2A18"/>
    <ellipse cx="61" cy="62" rx="7" ry="5" fill="url(#ngLeafGreen)" opacity="0.4"/>
  </g>

  <!-- ============ TREE SILHOUETTE (left) ============ -->
  <g transform="translate(60, 210)">
    <rect x="5" y="70" width="12" height="150" rx="3" fill="url(#ngTreeTrunk)"/>
    <path d="M11,85 Q-5,65 -18,55" fill="none" stroke="#1E1810" stroke-width="4" stroke-linecap="round"/>
    <path d="M11,70 Q25,55 38,45" fill="none" stroke="#1E1810" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="10" cy="45" rx="45" ry="38" fill="url(#ngLeafDark)" opacity="0.8"/>
    <ellipse cx="-5" cy="35" rx="32" ry="28" fill="#152E10" opacity="0.7"/>
    <ellipse cx="25" cy="30" rx="28" ry="25" fill="url(#ngLeafGreen)" opacity="0.5"/>
    <ellipse cx="10" cy="25" rx="22" ry="18" fill="url(#ngLeafMoon)" opacity="0.35"/>
    <!-- Moon-lit highlight on top -->
    <ellipse cx="20" cy="20" rx="15" ry="10" fill="#3A6830" opacity="0.2"/>
  </g>

  <!-- ============ MID GROUND ============ -->
  <path d="M0,360 Q200,348 400,355 Q600,345 800,352 L800,430 L0,430 Z" fill="url(#ngGroundMid)"/>

  <!-- ============ NEAR GROUND ============ -->
  <path d="M0,420 Q100,412 200,418 Q400,408 600,415 Q700,410 800,416 L800,600 L0,600 Z"
        fill="url(#ngGroundNear)"/>

  <!-- ============ RAISED GARDEN BEDS ============ -->
  <!-- Bed 1 (left) -->
  <g filter="url(#ngSubtleShadow)" transform="translate(50, 362)">
    <rect x="0" y="0" width="200" height="60" rx="5" fill="url(#ngWoodBed)"/>
    <rect x="4" y="4" width="192" height="52" rx="4" fill="url(#ngSoil)"/>
    <g opacity="0.15">
      <line x1="12" y1="16" x2="188" y2="16" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="28" x2="188" y2="28" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="40" x2="188" y2="40" stroke="#2A1A10" stroke-width="1"/>
    </g>
  </g>

  <!-- Bed 2 (center) -->
  <g filter="url(#ngSubtleShadow)" transform="translate(290, 358)">
    <rect x="0" y="0" width="220" height="60" rx="5" fill="url(#ngWoodBed)"/>
    <rect x="4" y="4" width="212" height="52" rx="4" fill="url(#ngSoil)"/>
    <g opacity="0.15">
      <line x1="12" y1="16" x2="208" y2="16" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="28" x2="208" y2="28" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="40" x2="208" y2="40" stroke="#2A1A10" stroke-width="1"/>
    </g>
  </g>

  <!-- Bed 3 (right) -->
  <g filter="url(#ngSubtleShadow)" transform="translate(555, 362)">
    <rect x="0" y="0" width="190" height="60" rx="5" fill="url(#ngWoodBed)"/>
    <rect x="4" y="4" width="182" height="52" rx="4" fill="url(#ngSoil)"/>
    <g opacity="0.15">
      <line x1="12" y1="16" x2="178" y2="16" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="28" x2="178" y2="28" stroke="#2A1A10" stroke-width="1"/>
      <line x1="12" y1="40" x2="178" y2="40" stroke="#2A1A10" stroke-width="1"/>
    </g>
  </g>

  <!-- ============ DIRT PATH ============ -->
  <path d="M0,490 Q100,475 200,470 Q400,458 600,465 Q700,472 800,480"
        fill="none" stroke="#2A2018" stroke-width="30" stroke-linecap="round" opacity="0.15"/>
  <path d="M0,490 Q100,475 200,470 Q400,458 600,465 Q700,472 800,480"
        fill="none" stroke="url(#ngPathGrad)" stroke-width="26" stroke-linecap="round" opacity="0.35"/>

  <!-- ============ GARDEN LANTERNS (solar) ============ -->
  <!-- Lantern 1 (near path left) -->
  <g transform="translate(200, 440)">
    <rect x="-1" y="5" width="2" height="22" rx="0.5" fill="#3A3028"/>
    <!-- Light -->
    <rect x="-4" y="0" width="8" height="6" rx="2" fill="url(#ngLanternGlow)" opacity="0.7"/>
    <!-- Glow -->
    <ellipse cx="0" cy="3" rx="20" ry="18" fill="url(#ngLanternRadial)" filter="url(#ngSmallGlow)" opacity="0.5"/>
  </g>
  <!-- Lantern 2 -->
  <g transform="translate(380, 432)">
    <rect x="-1" y="5" width="2" height="22" rx="0.5" fill="#3A3028"/>
    <rect x="-4" y="0" width="8" height="6" rx="2" fill="url(#ngLanternGlow)" opacity="0.7"/>
    <ellipse cx="0" cy="3" rx="20" ry="18" fill="url(#ngLanternRadial)" filter="url(#ngSmallGlow)" opacity="0.5"/>
  </g>
  <!-- Lantern 3 -->
  <g transform="translate(560, 438)">
    <rect x="-1" y="5" width="2" height="22" rx="0.5" fill="#3A3028"/>
    <rect x="-4" y="0" width="8" height="6" rx="2" fill="url(#ngLanternGlow)" opacity="0.65"/>
    <ellipse cx="0" cy="3" rx="18" ry="16" fill="url(#ngLanternRadial)" filter="url(#ngSmallGlow)" opacity="0.45"/>
  </g>

  <!-- ============ FIREFLIES ============ -->
  <g>
    <circle cx="280" cy="380" r="6" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.6"/>
    <circle cx="280" cy="380" r="1.5" fill="#C8E860" opacity="0.7"/>

    <circle cx="450" cy="400" r="5" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.5"/>
    <circle cx="450" cy="400" r="1.2" fill="#C8E860" opacity="0.6"/>

    <circle cx="150" cy="350" r="5" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.45"/>
    <circle cx="150" cy="350" r="1.2" fill="#C8E860" opacity="0.6"/>

    <circle cx="620" cy="370" r="5" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.5"/>
    <circle cx="620" cy="370" r="1.2" fill="#C8E860" opacity="0.6"/>

    <circle cx="350" cy="320" r="4" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.4"/>
    <circle cx="350" cy="320" r="1" fill="#C8E860" opacity="0.5"/>

    <circle cx="500" cy="340" r="4" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.4"/>
    <circle cx="500" cy="340" r="1" fill="#C8E860" opacity="0.5"/>

    <circle cx="700" cy="410" r="4" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.35"/>
    <circle cx="700" cy="410" r="1" fill="#C8E860" opacity="0.5"/>

    <circle cx="100" cy="420" r="4" fill="url(#ngFireflyGlow)" filter="url(#ngSmallGlow)" opacity="0.35"/>
    <circle cx="100" cy="420" r="1" fill="#C8E860" opacity="0.5"/>
  </g>

  <!-- ============ FENCE SILHOUETTE ============ -->
  <g opacity="0.35">
    <g transform="translate(140, 375)">
      <rect x="0" y="5" width="120" height="3" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="0" y="18" width="120" height="3" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="5" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="35" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="65" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="95" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
    </g>
    <g transform="translate(540, 378)">
      <rect x="0" y="5" width="130" height="3" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="0" y="18" width="130" height="3" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="5" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="35" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="65" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="95" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
      <rect x="125" y="-3" width="4" height="28" rx="1" fill="url(#ngFenceGrad)"/>
    </g>
  </g>

  <!-- ============ WATERING CAN SILHOUETTE ============ -->
  <g transform="translate(480, 400)" opacity="0.3">
    <rect x="0" y="5" width="20" height="18" rx="4" fill="#1E1810"/>
    <path d="M20,8 L32,2" stroke="#1E1810" stroke-width="2"/>
    <path d="M3,5 Q0,-4 6,-6 Q12,-4 17,5" fill="none" stroke="#1E1810" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- ============ OWL ON FENCE ============ -->
  <g transform="translate(565, 365)" opacity="0.5">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="6" ry="7" fill="#3A3028"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="5" fill="#3A3028"/>
    <!-- Ear tufts -->
    <path d="M-4,-12 L-3,-15 L-1,-12" fill="#3A3028"/>
    <path d="M1,-12 L3,-15 L4,-12" fill="#3A3028"/>
    <!-- Eyes (reflective) -->
    <circle cx="-2" cy="-8" r="1.8" fill="#FFE080" opacity="0.6"/>
    <circle cx="2" cy="-8" r="1.8" fill="#FFE080" opacity="0.6"/>
    <circle cx="-2" cy="-8" r="0.8" fill="#1A1A1A"/>
    <circle cx="2" cy="-8" r="0.8" fill="#1A1A1A"/>
    <!-- Beak -->
    <path d="M-1,-6 L0,-4 L1,-6" fill="#8A7A60" opacity="0.4"/>
  </g>

  <!-- ============ FOREGROUND GRASS (dark) ============ -->
  <g opacity="0.3">
    <path d="M25,600 Q22,578 28,565" fill="none" stroke="#152E10" stroke-width="2"/>
    <path d="M55,600 Q52,580 58,570" fill="none" stroke="#1E3A15" stroke-width="1.5"/>
    <path d="M760,600 Q758,582 762,572" fill="none" stroke="#152E10" stroke-width="2"/>
    <path d="M730,600 Q732,584 728,574" fill="none" stroke="#1E3A15" stroke-width="1.5"/>
    <path d="M430,600 Q428,584 433,574" fill="none" stroke="#1E3A15" stroke-width="1.5"/>
  </g>

  <!-- ============ COOL NIGHT OVERLAY ============ -->
  <rect width="800" height="600" fill="#0A1628" opacity="0.08"/>
</svg>
